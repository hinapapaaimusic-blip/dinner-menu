<title>食材から夕飯メニュー</title>
<style>
  :root {
    --bg: #fff7f0;
    --card: #ffffff;
    --primary: #e8714a;
    --primary-dark: #cc5a35;
    --accent: #4a9e8e;
    --text: #3a3330;
    --muted: #8a807a;
    --border: #f0e2d6;
    --shadow: 0 4px 16px rgba(180,120,80,.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 16px;
    max-width: 880px;
    margin: 0 auto;
  }
  header { text-align: center; padding: 12px 0 18px; }
  h1 { font-size: 1.5rem; color: var(--primary-dark); }
  .sub { color: var(--muted); font-size: .85rem; margin-top: 4px; }

  .ingredients {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(98px, 1fr));
    gap: 10px;
    margin-bottom: 22px;
  }
  .ing-btn {
    font-family: inherit;
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 14px 6px;
    cursor: pointer;
    text-align: center;
    transition: transform .08s, border-color .15s, background .15s;
  }
  .ing-btn:active { transform: scale(.95); }
  .ing-btn:hover { border-color: var(--primary); }
  .ing-btn .emoji { font-size: 1.9rem; display: block; line-height: 1.2; }
  .ing-btn .label { font-size: .85rem; font-weight: 600; margin-top: 2px; }
  .ing-btn .count { font-size: .68rem; color: var(--muted); }
  .ing-btn.on { background: var(--primary); border-color: var(--primary); }
  .ing-btn.on .label, .ing-btn.on .count { color: #fff; }

  .result-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; gap: 10px; flex-wrap: wrap;
  }
  .result-head h2 { font-size: 1.15rem; color: var(--primary-dark); }
  .result-head h2 .emoji { margin-right: 4px; }
  .btn-random {
    font-family: inherit; font-size: .85rem; font-weight: 600;
    background: var(--accent); color: #fff; border: none;
    border-radius: 12px; padding: 9px 16px; cursor: pointer;
    box-shadow: var(--shadow);
  }
  .btn-random:active { transform: scale(.96); }

  .genre-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .genre-chip {
    font-family: inherit; font-size: .8rem; font-weight: 600;
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: #fff; color: var(--muted);
    cursor: pointer; user-select: none;
  }
  .genre-chip:hover { border-color: var(--accent); }
  .genre-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
  .menu-card {
    background: var(--card);
    border-radius: 16px;
    padding: 15px 16px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--primary);
    transition: transform .12s, box-shadow .12s;
  }
  .menu-card.pick { border-top-color: var(--accent); outline: 2.5px solid var(--accent); animation: pop .35s; }
  @keyframes pop { 0%{transform:scale(.92)} 60%{transform:scale(1.03)} 100%{transform:scale(1)} }
  .menu-card .name { font-size: 1.1rem; font-weight: 700; }
  .menu-card .tags { font-size: .72rem; color: var(--muted); margin: 4px 0 10px; }
  .menu-card .tag { display: inline-block; background: #f6ede4; border-radius: 6px; padding: 1px 7px; margin: 0 4px 4px 0; }
  .menu-card .ing-title { font-size: .72rem; color: var(--accent); font-weight: 700; margin-bottom: 3px; }
  .menu-card .ing-list { font-size: .82rem; color: var(--text); }
  .menu-card .ing-list span:not(:last-child)::after { content: "・"; color: var(--muted); }

  .empty { text-align: center; color: var(--muted); padding: 40px 0; }
  footer { text-align: center; color: var(--muted); font-size: .75rem; margin: 30px 0 10px; }
</style>
</head>

let selected = null;
let genreFilter = null; // null = すべて

function buildIngredients(){
  const el = document.getElementById("ingredients");
  el.innerHTML = INGREDIENTS.map(g=>{
    const n = MENUS.filter(m=>m.main===g.key).length;
    return `<button class="ing-btn" data-k="${g.key}" onclick="selectIngredient('${g.key}')">
      <span class="emoji">${g.emoji}</span>
      <span class="label">${g.label}</span>
      <span class="count">${n}品</span>
    </button>`;
  }).join("");
}

function selectIngredient(key){
  selected = key;
  genreFilter = null; // 食材を変えたらジャンル絞り込みはリセット
  document.querySelectorAll(".ing-btn").forEach(b=> b.classList.toggle("on", b.dataset.k===key));
  buildGenreBar();
  renderMenus();
}

function buildGenreBar(){
  const bar = document.getElementById("genreBar");
  if(!selected){ bar.style.display="none"; bar.innerHTML=""; return; }
  // この食材に存在するジャンルを出現順で列挙
  const genres = [];
  MENUS.filter(m=>m.main===selected).forEach(m=>{ if(!genres.includes(m.genre)) genres.push(m.genre); });
  bar.style.display = "flex";
  const all = `<span class="genre-chip ${genreFilter===null?'on':''}" onclick="filterGenre(null)">すべて</span>`;
  bar.innerHTML = all + genres.map(g=>{
    const n = MENUS.filter(m=>m.main===selected && m.genre===g).length;
    return `<span class="genre-chip ${genreFilter===g?'on':''}" onclick="filterGenre('${g}')">${g} ${n}</span>`;
  }).join("");
}

function filterGenre(g){
  genreFilter = g;
  buildGenreBar();
  renderMenus();
}

function currentList(){
  return MENUS.filter(m=>m.main===selected && (genreFilter===null || m.genre===genreFilter));
}

function renderMenus(pickIdx){
  const head = document.getElementById("resultHead");
  const grid = document.getElementById("menuGrid");
  const empty = document.getElementById("emptyMsg");
  if(!selected){ head.style.display="none"; grid.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";
  head.style.display="flex";
  const info = INGREDIENTS.find(g=>g.key===selected);
  const list = currentList();
  const suffix = genreFilter ? `・${genreFilter}` : "";
  document.getElementById("resultTitle").innerHTML = `<span class="emoji">${info.emoji}</span>${info.label}${suffix}のメニュー（${list.length}品）`;
  grid.innerHTML = list.map((m,i)=>`
    <div class="menu-card ${i===pickIdx?'pick':''}">
      <div class="name">${m.name}</div>
      <div class="tags"><span class="tag">${m.genre}</span>${m.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      <div class="ing-title">材料</div>
      <div class="ing-list">${m.ing.map(x=>`<span>${x}</span>`).join("")}</div>
    </div>`).join("");
}

function pickRandom(){
  if(!selected) return;
  const list = currentList();
  if(list.length===0) return;
  const idx = Math.floor(Math.random()*list.length);
  renderMenus(idx);
  const cards = document.querySelectorAll(".menu-card");
  if(cards[idx]) cards[idx].scrollIntoView({behavior:"smooth", block:"center"});
}

buildIngredients();
